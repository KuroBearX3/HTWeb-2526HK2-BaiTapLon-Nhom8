<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng Trực Tuyến</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/giohang.css">
    <script src="../js/search.js"></script>
</head>
<body class="bg-light-subtle">

    <div id="header"></div>

    <main class="cart-container py-5">
        <div class="container">
            <nav class="cart-stepper mb-5">
                <div class="step active"><span>1</span><p>Giỏ hàng</p></div>
                <div class="line"></div>
                <div class="step"><span>2</span><p>Xác nhận</p></div>
            </nav>

            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="cart-header d-flex justify-content-between align-items-center mb-3">
                        <h4 class="fw-bold m-0">Giỏ hàng <span id="cart-count" class="text-muted fs-6">(0 sản phẩm)</span></h4>
                        <button class="btn btn-link text-danger text-decoration-none p-0" onclick="clearCart()">
                            <i class="bi bi-trash"></i> Xóa tất cả
                        </button>
                    </div>
                    
                    <div id="cart-items-list">
                        </div>
                </div>

                <div class="col-lg-4">
                    <div class="checkout-sidebar sticky-top">
                        <div class="card border-0 shadow-sm p-4">
                            <h5 class="fw-bold mb-4">Tóm tắt đơn hàng</h5>
                            
                            <div class="promo-code mb-4">
                                <label class="small fw-bold text-muted mb-2">MÃ GIẢM GIÁ</label>
                                <div class="input-group">
                                    <input type="text" class="form-control border-end-0 shadow-none" placeholder="Nhập mã...">
                                    <button class="btn btn-primary px-3">Áp dụng</button>
                                </div>
                            </div>

                            <div class="summary-details">
                                <div class="d-flex justify-content-between mb-2">
                                    <span class="text-muted">Tạm tính</span>
                                    <span id="sub-total" class="fw-medium">0đ</span>
                                </div>
                                <div class="d-flex justify-content-between mb-2">
                                    <span class="text-muted">Giảm giá</span>
                                    <span class="text-success">-0đ</span>
                                </div>
                                <div class="d-flex justify-content-between mb-3">
                                    <span class="text-muted">Phí vận chuyển</span>
                                    <span class="text-success fw-bold">Miễn phí</span>
                                </div>
                                <hr class="my-3">
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <span class="fw-bold fs-5">Tổng cộng</span>
                                    <span id="final-total" class="fs-4 fw-bold text-primary">0đ</span>
                                </div>
                            </div>

                            <button class="btn btn-primary w-100 py-3 fw-bold rounded-3 shadow-sm mb-3" onclick="processCheckout()">
                                TIẾN HÀNH ĐẶT HÀNG
                            </button>
                            
                            <div class="trust-badges d-flex justify-content-center gap-3 text-muted">
                                <i class="bi bi-shield-check fs-4" title="Bảo mật"></i>
                                <i class="bi bi-truck fs-4" title="Giao nhanh"></i>
                                <i class="bi bi-arrow-counterclockwise fs-4" title="Đổi trả 7 ngày"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script>
        function loadComponent(id, file) {
            fetch(file).then(res => res.text()).then(data => document.getElementById(id).innerHTML = data);
        }
        loadComponent("header", "header.html");
        loadComponent("footer", "footer.html");

        function updateCartUI() {
            const listContainer = document.getElementById('cart-items-list');
            let cart = JSON.parse(localStorage.getItem('netstore_cart')) || [];
            
            document.getElementById('cart-count').innerText = `(${cart.length} sản phẩm)`;

            if (cart.length === 0) {
                listContainer.innerHTML = `<div class="bg-white p-5 text-center rounded-4 shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/512/11329/11329060.png" width="120" class="mb-3 opacity-50">
                    <h5>Giỏ hàng đang trống</h5>
                    <a href="sanpham.html   " class="btn btn-primary mt-3 px-4">Quay lại mua sắm</a>
                </div>`;
                document.getElementById('sub-total').innerText = '0đ';
                document.getElementById('final-total').innerText = '0đ';
                return;
            }

            let total = 0;
            listContainer.innerHTML = cart.map((item, index) => {
                const sub = item.price * item.quantity;
                total += sub;
                return `
                <div class="cart-item-card bg-white p-3 rounded-4 shadow-sm mb-3 border-0">
                    <div class="row align-items-center">
                        <div class="col-md-2 col-4"><img src="${item.img}" class="img-fluid rounded-3"></div>
                        <div class="col-md-5 col-8">
                            <h6 class="fw-bold mb-1">${item.name}</h6>
                            <p class="text-primary fw-bold mb-0">${item.priceText}</p>
                        </div>
                        <div class="col-md-3 col-6 mt-3 mt-md-0">
                            <div class="qty-control d-flex align-items-center justify-content-center border rounded-pill py-1">
                                <button class="btn btn-sm border-0" onclick="changeQty(${index}, -1)"><i class="bi bi-dash"></i></button>
                                <span class="mx-3 fw-bold text-dark">${item.quantity}</span>
                                <button class="btn btn-sm border-0" onclick="changeQty(${index}, 1)"><i class="bi bi-plus"></i></button>
                            </div>
                        </div>
                        <div class="col-md-2 col-6 mt-3 mt-md-0 text-end">
                            <p class="fw-bold mb-0">${sub.toLocaleString('vi-VN')}đ</p>
                            <button class="btn btn-sm text-muted" onclick="removeItem(${index})"><i class="bi bi-trash"></i> Xóa</button>
                        </div>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('sub-total').innerText = total.toLocaleString('vi-VN') + 'đ';
            document.getElementById('final-total').innerText = total.toLocaleString('vi-VN') + 'đ';
        }

        window.changeQty = (i, d) => {
            let c = JSON.parse(localStorage.getItem('netstore_cart'));
            c[i].quantity += d;
            if (c[i].quantity < 1) c[i].quantity = 1;
            localStorage.setItem('netstore_cart', JSON.stringify(c));
            updateCartUI();
        };

        window.removeItem = (i) => {
            let c = JSON.parse(localStorage.getItem('netstore_cart'));
            c.splice(i, 1);
            localStorage.setItem('netstore_cart', JSON.stringify(c));
            updateCartUI();
        };

        window.clearCart = () => {
            if(confirm("Xóa sạch giỏ hàng?")) {
                localStorage.removeItem('netstore_cart');
                updateCartUI();
            }
        };

        updateCartUI();

        
    </script>
</body>
</html>
